<div class="navbar-wrapper">
  <div class="navbar-content">
    <div class="flex align-items-center gap-3">
      <div class="logo-container">
        <i class="pi pi-home text-gold text-xl"></i>
        <span class="logo-text font-heading">Bank<span class="text-gold">Core</span></span>
      </div>

      <div class="breadcrumbs flex align-items-center gap-2">
        <i class="pi pi-chevron-right text-muted text-xs"></i>
        <span class="breadcrumb-item">Customers</span>

        @if (auth.user(); as user) {
        <i class="pi pi-chevron-right text-muted text-xs"></i>
        <span class="breadcrumb-item text-white">{{ user.name }}</span>
        }
      </div>
    </div>
    <div class="flex align-items-center gap-3">
      <div class="user-profile">
        <i class="pi pi-user"></i>
      </div>
      <button class="sign-out-btn" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Sign Out</span>
      </button>
    </div>
  </div>
</div>

<div class="main-content">
  <router-outlet></router-outlet>
</div>
